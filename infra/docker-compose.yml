version: "3.9"

# Full local stack for the trading platform.
# Start order: infra → db → pipeline → engine → observability

services:

  # ── Message Broker ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/create-topics.sh
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    restart: on-failure

  # ── Database ─────────────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  # ── Pipeline (Python) ─────────────────────────────────────────────────────────

  exchange-connector:
    build:
      context: ../pipeline
      dockerfile: exchange_connector/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      TRADE_SYMBOLS: ${TRADE_SYMBOLS:-btcusdt,ethusdt}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  candle-aggregator:
    build:
      context: ../pipeline
      dockerfile: candle_aggregator/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgresql://trading:${POSTGRES_PASSWORD}@postgres/trading
      CANDLE_TIMEFRAME_MINUTES: ${CANDLE_TIMEFRAME_MINUTES:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  signal-router:
    build:
      context: ../pipeline
      dockerfile: signal_router/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgresql://trading:${POSTGRES_PASSWORD}@postgres/trading
      SIGNAL_MIN_CONFIDENCE: ${SIGNAL_MIN_CONFIDENCE:-0.7}
      SIGNAL_TTL_SECONDS: ${SIGNAL_TTL_SECONDS:-90}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  signal-generator:
    build:
      context: ../pipeline
      dockerfile: signal_pipeline/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgresql://trading:${POSTGRES_PASSWORD}@postgres/trading
      TRADE_SYMBOLS: ${TRADE_SYMBOLS:-BTCUSDT,ETHUSDT}
      SIGNAL_INTERVAL_SECONDS: ${SIGNAL_INTERVAL_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  # ── Engine (C# .NET 8) ───────────────────────────────────────────────────────

  oms:
    build:
      context: ../engine
      dockerfile: src/OMS/TradingPlatform.OMS.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__Postgres: Host=postgres;Database=trading;Username=trading;Password=${POSTGRES_PASSWORD}
      Kafka__Brokers: kafka:9092
      ASPNETCORE_ENVIRONMENT: Development

  ems:
    build:
      context: ../engine
      dockerfile: src/EMS/TradingPlatform.EMS.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "5002:8080"
    environment:
      Kafka__Brokers: kafka:9092
      Binance__BaseUrl: ${BINANCE_BASE_URL:-https://testnet.binance.vision}
      Binance__ApiKey: ${BINANCE_API_KEY}
      Binance__SecretKey: ${BINANCE_SECRET_KEY}
      ASPNETCORE_ENVIRONMENT: Development

  # ── Observability ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver

volumes:
  postgres_data:
  grafana_data:
